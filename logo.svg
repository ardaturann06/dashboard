<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <radialGradient id="bg" cx="40%" cy="30%" r="80%">
      <stop offset="0%" stop-color="#0e0e1a"/>
      <stop offset="100%" stop-color="#07070d"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Arka plan -->
  <rect width="64" height="64" rx="13" fill="url(#bg)"/>

  <!-- Kenar çizgisi -->
  <rect width="62" height="62" x="1" y="1" rx="12" fill="none" stroke="#00ffc8" stroke-width="1" opacity="0.35"/>

  <!-- A harfi - sol çizgi -->
  <line x1="15" y1="51" x2="29" y2="13" stroke="#00ffc8" stroke-width="4.5" stroke-linecap="round" filter="url(#glow)"/>
  <!-- A harfi - sağ çizgi -->
  <line x1="49" y1="51" x2="35" y2="13" stroke="#00ffc8" stroke-width="4.5" stroke-linecap="round" filter="url(#glow)"/>
  <!-- A harfi - yatay çizgi -->
  <line x1="21" y1="36" x2="43" y2="36" stroke="#00ffc8" stroke-width="3.5" stroke-linecap="round" filter="url(#glow)"/>

  <!-- Tepe mor nokta -->
  <circle cx="32" cy="13" r="4" fill="#b06fff" filter="url(#glow)"/>

  <!-- Alt köşe küçük noktalar -->
  <circle cx="15" cy="51" r="2.5" fill="#00ffc8" opacity="0.6"/>
  <circle cx="49" cy="51" r="2.5" fill="#00ffc8" opacity="0.6"/>
</svg>
